# Scale deployment stack — Mem0/OpenMemory (ADR-006).
#
# Usage:
#   ./scripts/bootstrap-scale.sh
#   docker compose -f docker-compose.scale.yml up -d
#
# Connect via the reverse proxy (default port 8765). API workers and write
# workers are decoupled; metadata/queue live in PostgreSQL via PgBouncer.
#
# This is the SINGLE supported deployment mode of the project. The UI (incl. the
# /admin panel) is part of the default stack (port 3000). Use ``python install.py``.

x-api-common: &api-common
  image: mem0/openmemory-mcp
  build:
    context: ..
    dockerfile: openmemory/api/Dockerfile
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment: &api-env
    USER: ${USER:-openmemory}
    API_KEY: ${API_KEY:-}
    MEM0_LOCAL_ONLY: ${MEM0_LOCAL_ONLY:-1}
    MEM0_TELEMETRY: ${MEM0_TELEMETRY:-false}
    # Fail-closed: block API/MCP memory deletes unless explicitly enabled.
    MEM0_ALLOW_MEMORY_DELETE: ${MEM0_ALLOW_MEMORY_DELETE:-0}
    MEM0_ALLOW_BULK_DELETE: ${MEM0_ALLOW_BULK_DELETE:-0}
    QDRANT_HOST: mem0_store
    QDRANT_PORT: "6333"
    DATABASE_URL: postgresql://${POSTGRES_USER:-mem0}:${POSTGRES_PASSWORD:-mem0}@pgbouncer:5432/${POSTGRES_DB:-openmemory}
    REDIS_URL: redis://redis:6379/0
    # Inferência via Ollama EXTERNO (host/rede), o padrão deste stack. Default
    # host.docker.internal cobre um Ollama no próprio host; para um Ollama em
    # outra máquina da LAN, defina estas URLs no .env com o IP/porta dele.
    # Para subir Ollama em container, use o profile `local-inference` (compose/
    # inference.yml) e aponte estas URLs para ollama-llm / ollama-embed.
    LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
    LLM_MODEL: ${LLM_MODEL:-}
    LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434}
    LLM_API_KEY: ${LLM_API_KEY:-}
    OLLAMA_LLM_URL: ${OLLAMA_LLM_URL:-http://host.docker.internal:11434}
    EMBEDDER_PROVIDER: ${EMBEDDER_PROVIDER:-ollama}
    EMBEDDER_MODEL: ${EMBEDDER_MODEL:-}
    EMBEDDER_BASE_URL: ${EMBEDDER_BASE_URL:-http://host.docker.internal:11434}
    OLLAMA_EMBED_URL: ${OLLAMA_EMBED_URL:-http://host.docker.internal:11434}
    OPENMEMORY_DISCOVERY_BASE_URL: ${OPENMEMORY_DISCOVERY_BASE_URL:-}
    RUN_EMBEDDED_WORKER: "false"
    WRITE_WORKER_MAX_CONCURRENCY: ${WRITE_WORKER_MAX_CONCURRENCY:-1}
    # Autenticação por equipe (task_11 / ADR-006): warn (default) -> enforce.
    AUTH_MODE: ${AUTH_MODE:-warn}
    # Caminho do secret de tokens (ex.: Docker secret montado em /run/secrets).
    AUTH_TOKENS_FILE: ${AUTH_TOKENS_FILE:-/run/secrets/team_tokens}
    # Auth Google + identidade (feature auth Google, ADR-002/ADR-006/ADR-007).
    # AUTH_JWT_SECRET assina o JWT de sessão da UI (>= 32 bytes; defina no .env
    # ou monte como secret). AUTH_ALLOWED_DOMAIN restringe o login ao domínio
    # Google Workspace da empresa. GOOGLE_CLIENT_ID valida o `aud` do ID token;
    # GOOGLE_CLIENT_SECRET é exigido pelo polling do Device Flow (ADR-007).
    # Sem AUTH_JWT_SECRET/AUTH_ALLOWED_DOMAIN o login Google fica desabilitado
    # (fail-closed) e o fluxo legado por hostname segue intacto.
    AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-}
    AUTH_ALLOWED_DOMAIN: ${AUTH_ALLOWED_DOMAIN:-}
    GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    # Client OAuth separado p/ device flow (tipo "TVs"; ADR-009) — opcional,
    # fallback para GOOGLE_CLIENT_ID/SECRET quando ausente.
    GOOGLE_DEVICE_CLIENT_ID: ${GOOGLE_DEVICE_CLIENT_ID:-}
    GOOGLE_DEVICE_CLIENT_SECRET: ${GOOGLE_DEVICE_CLIENT_SECRET:-}
    # Tracing OTLP (task_08 / ADR-004).
    OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
    OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-}
    # Object store para backup/cold tier (task_02/07 / ADR-003).
    S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
    S3_BUCKET: ${S3_BUCKET:-mem0-backups}
    S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
    S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
    # Caminho no host montado em /mnt/backups (traduzido pela API para a UI).
    LOCAL_BACKUP_DIR: ${LOCAL_BACKUP_DIR:-./backups}
  env_file:
    - api/.env
  depends_on:
    mem0_store:
      condition: service_started
    pgbouncer:
      condition: service_healthy
    redis:
      condition: service_healthy

include:
  - compose/postgres.yml
  - compose/redis.yml
  - compose/inference.yml
  - compose/proxy.yml
  - compose/observability.yml
  - compose/backup.yml

services:
  mem0_store:
    container_name: mem0_store
    image: qdrant/qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ${QDRANT_STORAGE:-mem0_storage}:/qdrant/storage

  openmemory-mcp:
    <<: *api-common
    container_name: openmemory_api
    labels:
      - traefik.enable=true
      # MCP (consultas de memória): sem circuit breaker — leitura é crítica.
      - traefik.http.routers.openmemory-mcp.rule=PathPrefix(`/mcp`)
      - traefik.http.routers.openmemory-mcp.entrypoints=web
      - traefik.http.routers.openmemory-mcp.service=openmemory
      - traefik.http.routers.openmemory-mcp.priority=100
      - traefik.http.middlewares.openmemory-mcp-ratelimit.ratelimit.average=500
      - traefik.http.middlewares.openmemory-mcp-ratelimit.ratelimit.burst=200
      - traefik.http.routers.openmemory-mcp.middlewares=openmemory-mcp-ratelimit
      # Demais rotas: rate limit + circuit breaker para proteger escrita/admin.
      - traefik.http.routers.openmemory.rule=PathPrefix(`/`) && !PathPrefix(`/mcp`)
      - traefik.http.routers.openmemory.entrypoints=web
      - traefik.http.routers.openmemory.priority=1
      - traefik.http.services.openmemory.loadbalancer.server.port=8765
      - traefik.http.services.openmemory.loadbalancer.sticky.cookie=true
      - traefik.http.services.openmemory.loadbalancer.sticky.cookie.name=mem0_sse_affinity
      - traefik.http.middlewares.openmemory-ratelimit.ratelimit.average=100
      - traefik.http.middlewares.openmemory-ratelimit.ratelimit.burst=50
      - traefik.http.middlewares.openmemory-cb.circuitbreaker.expression=ResponseCodeRatio(500, 600, 0, 600) > 0.50
      - traefik.http.routers.openmemory.middlewares=openmemory-ratelimit,openmemory-cb
    depends_on:
      mem0_store:
        condition: service_started
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      traefik:
        condition: service_started
    # Diretório local de backup (.zip), montado para restore/list/status e backup
    # manual via /admin/backup/* (task_06 / ADR-003). Alinhado ao local_dir padrão
    # da BackupPolicy (/mnt/backups). Defina LOCAL_BACKUP_DIR no .env para apontar
    # a um caminho da LAN. NÃO substitui os volumes mem0_storage/mem0_pgdata.
    volumes:
      - ${LOCAL_BACKUP_DIR:-./backups}:/mnt/backups
    # --no-access-log: o access log do uvicorn imprime a URL completa com query
    # string, o que vazaria o ?token= dos agentes (ADR-003). A observabilidade
    # de requisições vem do logging estruturado (request_id/auth_method) e das
    # trilhas write/read_audit_logs — que nunca contêm o token.
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8765 --workers 2 --no-access-log"

  openmemory-write-worker:
    <<: *api-common
    container_name: openmemory_write_worker
    environment:
      <<: *api-env
      RUN_EMBEDDED_WORKER: "false"
      WRITE_WORKER_MAX_CONCURRENCY: ${WRITE_WORKER_MAX_CONCURRENCY:-1}
      WRITE_WORKER_BATCH_SIZE: ${WRITE_WORKER_BATCH_SIZE:-1}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.workers

  # Governança (Fase 3 / ADR-005): consome a fila de governança e roda o
  # processamento "inteligente" off-peak — dedup, consolidação (dream), ttl,
  # quota e cold tier — com scheduler interno e parada obrigatória na janela
  # off_peak_hours_utc. Singleton (uma instância); o lock é a própria fila.
  openmemory-governance-worker:
    <<: *api-common
    container_name: openmemory_governance_worker
    environment:
      <<: *api-env
      RUN_EMBEDDED_WORKER: "false"
      GOVERNANCE_ENABLE_SCHEDULER: "true"
    depends_on:
      mem0_store:
        condition: service_started
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.workers.governance_worker

  # Backup autônomo (task_06 / ADR-002). Lê a BackupPolicy (Config) e dispara
  # BackupArchive.create() conforme a agenda; respeita enabled=False por padrão
  # (não faz backup até ser configurado na UI). Singleton; grava no diretório
  # local montado e, se mirror_s3, espelha no bucket.
  openmemory-backup-worker:
    <<: *api-common
    container_name: openmemory_backup_worker
    environment:
      <<: *api-env
      RUN_EMBEDDED_WORKER: "false"
      BACKUP_WORKER_SLEEP: ${BACKUP_WORKER_SLEEP:-300}
    volumes:
      - ${LOCAL_BACKUP_DIR:-./backups}:/mnt/backups
    depends_on:
      mem0_store:
        condition: service_started
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.workers.backup_worker

  # Blue-green partition migration (Fase 2 / task_06 / ADR-003). Run on demand to
  # copy the existing base into the partitioned (green) collection; isolated from
  # the write worker so the bulk copy does not compete with the write-queue SLA.
  openmemory-migration-worker:
    <<: *api-common
    container_name: openmemory_migration_worker
    profiles: ["migration"]
    restart: "no"
    environment:
      <<: *api-env
      RUN_EMBEDDED_WORKER: "false"
    depends_on:
      pgbouncer:
        condition: service_healthy
    command: python -m app.workers.migration_worker

  # UI (painel + /admin) — parte padrão do stack de produção (modo único).
  # NEXT_PUBLIC_API_URL é aplicado em runtime pelo entrypoint (sed no bundle):
  # aponte-o para o proxy acessível na LAN (ex.: http://IP_DA_LAN:8765) para que
  # navegadores remotos alcancem a API. O installer grava esse valor no .env.
  openmemory-ui:
    container_name: openmemory_ui
    build:
      context: ui/
      dockerfile: Dockerfile
    image: mem0/openmemory-ui:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    # HTTPS via Traefik (ADR-009): https://${UI_HOSTNAME} → UI. O acesso direto
    # http://IP:3000 continua funcionando (porta publicada acima).
    labels:
      - traefik.enable=true
      - traefik.http.routers.openmemory-ui.rule=Host(`${UI_HOSTNAME:-memorias.sysmo.com.br}`)
      - traefik.http.routers.openmemory-ui.entrypoints=websecure
      - traefik.http.routers.openmemory-ui.tls=true
      - traefik.http.services.openmemory-ui.loadbalancer.server.port=3000
    depends_on:
      openmemory-mcp:
        condition: service_started
    environment:
      # Browser calls /api-proxy on the same host:port; Next rewrites to the API container.
      - API_INTERNAL_URL=http://openmemory-mcp:8765
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api-proxy}
      # URL direta da API para os comandos de instalação MCP (agentes conectam
      # por IP:8765, não pelo hostname da UI). Sem isto, ao acessar a UI via
      # https://memorias.sysmo.com.br os comandos sairiam com
      # https://memorias.sysmo.com.br:8765 (porta não roteada no hostname → erro).
      # O installer grava aqui o discovery URL (http://IP_DA_LAN:8765).
      - NEXT_PUBLIC_MCP_URL=${NEXT_PUBLIC_MCP_URL:-}
      - NEXT_PUBLIC_USER_ID=${OPENMEMORY_UI_USER_ID:-openmemory}
      # Login Google na UI (feature auth Google, ADR-002). Segredos de servidor
      # (não passam pelo sed de NEXT_PUBLIC_* do entrypoint): defina no .env.
      # NEXTAUTH_URL deve ser a URL da UI acessível na LAN (ex.: http://IP:3000).
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}

volumes:
  mem0_storage:

