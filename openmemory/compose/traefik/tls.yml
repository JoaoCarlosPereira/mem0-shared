# Configuração dinâmica de TLS do Traefik (feature auth Google, ADR-009).
#
# O certificado da UI (ex.: memorias.sysmo.com.br) é montado de
# ${TLS_CERT_DIR:-openmemory/certs} como /certs/ui.crt e /certs/ui.key —
# fullchain PEM + chave privada. Emissão recomendada: Let's Encrypt via
# desafio DNS-01 (não exige exposição à internet) ou CA interna da empresa.
# Sem os arquivos, o Traefik loga erro e serve o certificado default
# (autoassinado) — o restante do stack segue intacto.
tls:
  certificates:
    - certFile: /certs/ui.crt
      keyFile: /certs/ui.key
